<!DOCTYPE html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>SocietyBrands · Month over Month · June vs May 2026</title><style>
    :root{--deep:#2F4A43;--forest:#587068;--ivory:#F6F4EE;--sand:#EDE9DF;--gold:#C8A86B;
      --ink:#2F4A43;--mut:#6B7280;--line:#E3E0D6;--good:#1E7A5A;--bad:#B4503C;
      --serif:"Iowan Old Style",Palatino,Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
    *{box-sizing:border-box}body{margin:0;background:var(--ivory);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    .wrap{max-width:1080px;margin:0 auto;padding:0 24px 60px}
    header{background:linear-gradient(125deg,#1E332E,var(--deep) 55%,var(--forest));color:#fff}
    header .in{max-width:1080px;margin:0 auto;padding:24px 24px 22px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}
    header img{height:34px}h1{font-family:var(--serif);font-weight:600;font-size:26px;margin:10px 0 2px}
    .sub{opacity:.85;font-size:13px}.per{font-family:var(--serif);font-size:20px;text-align:right}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:-26px 0 16px}
    .kpi{background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px 16px;box-shadow:0 8px 24px rgba(30,51,46,.06);position:relative;overflow:hidden}
    .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--forest)}
    .kl{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);font-weight:700}
    .kv{font-family:var(--serif);font-size:29px;font-weight:600;color:var(--deep);margin-top:3px}
    .kf{margin-top:8px;font-size:12px}.mut{color:var(--mut)}
    .d{font-weight:700;font-size:11.5px;padding:2px 8px;border-radius:999px}
    .d.up{color:var(--good);background:#1e7a5a14}.d.down{color:var(--bad);background:#b4503c14}.d.flat{color:var(--mut);background:#6b728014}
    .ratios{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 20px}
    .rc{background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 13px;font-size:12.5px}
    .rl{color:var(--mut);font-weight:700;margin-right:7px;text-transform:uppercase;font-size:10.5px;letter-spacing:.06em}
    .rv{font-weight:700;color:var(--deep);margin-right:7px}
    .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:0 8px 24px rgba(30,51,46,.05);margin-bottom:18px}
    .panel h3{font-family:var(--serif);font-weight:600;font-size:17px;margin:0 0 3px;color:var(--deep)}
    .ph{font-size:11.5px;color:var(--mut);margin-bottom:12px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left}
    th{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);font-weight:700}
    td.num{text-align:right;font-variant-numeric:tabular-nums}.bn{font-weight:700;color:var(--deep)}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}
    td.bar{width:34%}.tk{height:14px;background:var(--sand);border-radius:7px;overflow:hidden}
    .fl{height:100%;width:0;border-radius:7px;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
    tfoot td{font-weight:800;border-top:2px solid var(--deep);border-bottom:none}
    .note{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:12px;padding:13px 16px;font-size:12px;color:#5b5448;line-height:1.7}
    footer{text-align:center;color:var(--mut);font-size:11.5px;margin-top:22px}
    @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}td.bar{display:none}}
    
    .auth-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:24px;
      background:linear-gradient(125deg,#1E332E,var(--deep) 55%,var(--forest))}
    .auth-overlay.show{display:flex}
    .auth-card{background:#fff;border-radius:18px;padding:34px 34px 26px;width:100%;max-width:380px;
      box-shadow:0 24px 70px rgba(0,0,0,.45);display:flex;flex-direction:column}
    .auth-logo{height:28px;align-self:flex-start;margin-bottom:18px;
      filter:brightness(0) saturate(100%) invert(28%) sepia(11%) saturate(900%) hue-rotate(110deg) brightness(92%)}
    .auth-title{font-family:var(--serif);font-weight:600;font-size:21px;color:var(--deep)}
    .auth-sub{font-size:12.5px;color:var(--mut);margin:3px 0 18px}
    .auth-lbl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:700;margin-bottom:5px}
    .auth-card input{border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;
      font-family:var(--sans);color:var(--deep);margin-bottom:14px;background:var(--ivory)}
    .auth-card input:focus{outline:2px solid #8AA399;background:#fff}
    .auth-err{color:var(--bad);font-size:12.5px;font-weight:600;min-height:18px;margin:-6px 0 8px}
    .auth-btn{border:0;border-radius:11px;padding:13px;font-weight:800;font-size:14.5px;cursor:pointer;
      background:var(--deep);color:#fff;font-family:var(--sans)}
    .auth-btn:hover{filter:brightness(1.12)}.auth-btn:disabled{opacity:.6}
    .auth-foot{text-align:center;font-size:10.5px;color:var(--mut);letter-spacing:.06em;margin-top:14px}
